name: Infrastructure Destroy

on:
  schedule:
    - cron: '30 12 * * *'  # 6 PM IST daily (12:30 UTC)
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  WORKING_DIR: ./infra/terraform

jobs:
  destroy-all:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: ${{ env.WORKING_DIR }}

    - name: Terraform Destroy
      run: terraform destroy -auto-approve
      working-directory: ${{ env.WORKING_DIR }}

    - name: Destroy ECR Repo
      run: |
        aws ecr delete-repository --repository-name rushikesh-strapi --force || true

    - name: Destroy S3 Bucket (TF State) - FIXED
      run: |
        # Method 1: Simple force delete (handles versions automatically)
        aws s3 rb s3://rushikesh-strapi-terraform-tfstate --force || true
        
        # Fallback: Manual cleanup if rb fails
        aws s3 rm s3://rushikesh-strapi-terraform-tfstate --recursive --force || true
        aws s3api delete-bucket --bucket rushikesh-strapi-terraform-tfstate --force || true

    
